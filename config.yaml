LOG_LEVEL: "debug"
METRICS_PORT: 9090
HEALTH_PORT: 8085
REGISTRY_PATH: "http://vdr:8080/api/v1/devices"
NETWORK_TIMEOUT_MS: 5000
IOT_HUB_HOSTNAME: "AV-IOT-HUB.azure-devices.net"
CERT_PATH: "./cert.pem"
KEY_PATH: "./key.pem"
WORKER_POOL_SIZE: 10
COMMAND_QUEUE_SIZE: 500
RETRY_MAX_ATTEMPTS: 2
RETRY_BASE_BACKOFF_MS: 100
PROMETHEUS_URL: "http://localhost:9090"
PROMETHEUS_METRICS:
  - "gateway_commands_dropped_total"
  - "gateway_command_latency_seconds_count"
PROMETHEUS_POLL_INTERVAL: "30s"
PROMETHEUS_MQTT_TOPIC: "devices/edge-gateway-sim/messages/events/metrics"
